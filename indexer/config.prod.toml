# efrep-indexer — production config
# All secrets are injected via Railway env vars which override TOML values.

[network]
rpc_url = "https://fullnode.testnet.sui.io:443"
graphql_url = "https://graphql.testnet.sui.io/graphql"

[package]
id = "0xPLACEHOLDER"
start_checkpoint = 0

[database]
url = "env:DATABASE_URL"
max_connections = 20

[indexer]
batch_size = 50
poll_interval_ms = 2000
# event_source_mode: set EFREP_EVENT_SOURCE_MODE=shadow on Railway to enable
# GraphQL parity checking without changing production event ingestion.

[trust]
default_gate_schema = "TRIBE_STANDING"
default_counterparty_schema = "TRIBE_STANDING"

# [provenance] — set via EFREP_MVR_NAME, EFREP_MVR_VERSION env vars on Railway.
# Omit to keep proof bundles unchanged (provenance field absent).

[eve]
enabled = true
world_api_base = "https://world-api-stillness.live.tech.evefrontier.com"
graphql_url = "https://graphql.testnet.sui.io/graphql"
# world_package_id, world_pkg_original_id, world_pkg_published_at intentionally
# omitted — must be set via Railway env vars EFREP_EVE_WORLD_PACKAGE_ID,
# EFREP_WORLD_PKG_ORIGINAL_ID, EFREP_WORLD_PKG_PUBLISHED_AT.
# The indexer refuses to start if these are missing or contain PLACEHOLDER.
world_tenant = "stillness"
world_start_checkpoint = 308264360
fw_gate_extension_typename = ""
# player_profile_type must be set via EFREP_EVE_PLAYER_PROFILE_TYPE env var.
