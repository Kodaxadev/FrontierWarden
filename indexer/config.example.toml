# efrep-indexer configuration template
# Copy to config.toml and fill in real values.
# Database URL uses env: syntax to read from environment variable at runtime.

[network]
rpc_url = "https://fullnode.testnet.sui.io:443"

[package]
# Current testnet package ID (after v2 upgrade).
id = "0xYOUR_TESTNET_PACKAGE_ID"
# Informational — logged on fresh start but not used as RPC filter.
start_checkpoint = 0

[database]
# Use env: prefix to read from environment variable at runtime.
url = "env:SUPABASE_DATABASE_URL"
max_connections = 20

[indexer]
batch_size = 50
poll_interval_ms = 2000

# ── EVE Frontier Integration ──────────────────────────────────────────────────
# Stillness is the primary environment for the current demo.
# Utopia remains available as a sandbox environment.
# Both Stillness and Utopia currently use Sui testnet GraphQL for identity lookup.
# IMPORTANT: Do not use Utopia PlayerProfile type for Stillness identities —
# the package IDs and type strings are different between environments.

[eve]
enabled = true
world_api_base = "https://world-api-stillness.live.tech.evefrontier.com"
graphql_url = "https://graphql.testnet.sui.io/graphql"
world_package_id = "0x28b497559d65ab320d9da4613bf2498d5946b2c0ae3597ccfda3072ce127448c"
world_pkg_original_id = "0x28b497559d65ab320d9da4613bf2498d5946b2c0ae3597ccfda3072ce127448c"
world_pkg_published_at = "0xd2fd1224f881e7a705dbc211888af11655c315f2ee0f03fe680fc3176e6e4780"
world_tenant = "stillness"
fw_gate_auth_witness = "FrontierWardenAuth"
# Full TypeName for the authorized world gate extension witness.
# Leave empty until FrontierWarden has a real gate extension Auth type.
fw_gate_extension_typename = ""
player_profile_type = "0x28b497559d65ab320d9da4613bf2498d5946b2c0ae3597ccfda3072ce127448c::character::PlayerProfile"

# ── Utopia sandbox preset (commented) ─────────────────────────────────────────
# To switch to Utopia, replace the [eve] section above with:
#
# [eve]
# enabled = true
# world_api_base = "https://world-api-utopia.uat.pub.evefrontier.com"
# graphql_url = "https://graphql.testnet.sui.io/graphql"
# world_package_id = "0xd12a70c74c1e759445d6f209b01d43d860e97fcf2ef72ccbbd00afd828043f75"
# player_profile_type = "0xd12a70c74c1e759445d6f209b01d43d860e97fcf2ef72ccbbd00afd828043f75::character::PlayerProfile"
#
# Environment variable overrides (optional):
#   EFREP_EVE_WORLD_API_BASE
#   EFREP_EVE_GRAPHQL_URL
#   EFREP_EVE_WORLD_PACKAGE_ID
#   EFREP_WORLD_PKG_ORIGINAL_ID
#   EFREP_WORLD_PKG_PUBLISHED_AT
#   EFREP_WORLD_TENANT
#   EFREP_FW_GATE_AUTH_WITNESS
#   EFREP_FW_GATE_EXTENSION_TYPENAME
#   EFREP_EVE_PLAYER_PROFILE_TYPE
